kind = "web"
previewPath = "/"
title = "Token Gate"
version = "1.0.0"
id = "artifacts/token-gate"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22402

[services.development]
run = "pnpm --filter @workspace/token-gate run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/token-gate", "run", "build" ]
publicDir = "artifacts/token-gate/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22402"
BASE_PATH = "/"
